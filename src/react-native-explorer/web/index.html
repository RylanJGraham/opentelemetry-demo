<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="React Native Explorer — AI-powered mobile app exploration visualizer" />
  <title>React Native Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <!-- Top Navigation Bar -->
  <header id="app-header">
    <div class="header-left">
      <div class="logo">
        <span class="logo-icon">🔍</span>
        <h1>Explorer</h1>
      </div>
      <nav class="nav-tabs" id="nav-tabs">
        <button class="nav-tab active" data-view="graph" id="tab-graph">
          <span class="tab-icon">◉</span> Graph
        </button>
        <button class="nav-tab" data-view="gallery" id="tab-gallery">
          <span class="tab-icon">▦</span> Gallery
        </button>
        <button class="nav-tab" data-view="stories" id="tab-stories">
          <span class="tab-icon">📋</span> Stories
        </button>
      </nav>
    </div>
    <div class="header-right">
      <div class="status-indicator" id="status-indicator">
        <span class="status-dot" id="status-dot"></span>
        <span class="status-text" id="status-text">Connecting...</span>
      </div>
      <div class="stats-bar" id="stats-bar">
        <div class="stat">
          <span class="stat-value" id="stat-screens">0</span>
          <span class="stat-label">Screens</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-transitions">0</span>
          <span class="stat-label">Transitions</span>
        </div>
        <div class="stat">
          <span class="stat-value" id="stat-actions">0</span>
          <span class="stat-label">Actions</span>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content Area -->
  <main id="app-main">
    <!-- Graph View -->
    <section class="view active" id="view-graph">
      <div class="graph-container" id="graph-container">
        <svg id="graph-svg"></svg>
      </div>
      <!-- Screen detail sidebar -->
      <aside class="detail-panel" id="detail-panel">
        <button class="detail-close" id="detail-close">✕</button>
        <div class="detail-content" id="detail-content">
          <p class="detail-placeholder">Click a node to view screen details</p>
        </div>
      </aside>
    </section>

    <!-- Gallery View -->
    <section class="view" id="view-gallery">
      <div class="gallery-toolbar" id="gallery-toolbar">
        <input type="text" class="search-input" id="gallery-search" placeholder="Search screens..." />
        <select class="filter-select" id="gallery-filter">
          <option value="all">All Types</option>
          <option value="authentication">Authentication</option>
          <option value="list">List</option>
          <option value="detail">Detail</option>
          <option value="settings">Settings</option>
          <option value="navigation">Navigation</option>
          <option value="form">Form</option>
        </select>
      </div>
      <div class="gallery-grid" id="gallery-grid"></div>
    </section>

    <!-- Story Builder View -->
    <section class="view" id="view-stories">
      <div class="stories-layout">
        <div class="stories-sidebar" id="stories-sidebar">
          <h3>Saved Stories</h3>
          <div class="stories-list" id="stories-list">
            <p class="empty-state">No stories yet</p>
          </div>
          <button class="btn btn-primary" id="btn-new-story">+ New Story</button>
        </div>
        <div class="story-editor" id="story-editor">
          <div class="story-header">
            <input type="text" class="story-title-input" id="story-title" placeholder="Story name..." />
            <div class="story-actions">
              <button class="btn btn-outline" id="btn-save-story">💾 Save</button>
              <button class="btn btn-outline" id="btn-export-story">📤 Export</button>
            </div>
          </div>
          <div class="story-canvas" id="story-canvas">
            <p class="empty-state">Drag screens from the gallery below to build a story</p>
          </div>
          <div class="story-screen-picker" id="story-screen-picker">
            <h4>Available Screens</h4>
            <div class="picker-grid" id="picker-grid"></div>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Live Activity Feed (floating) -->
  <div class="activity-feed" id="activity-feed">
    <div class="feed-header">
      <span>Live Activity</span>
      <button class="feed-toggle" id="feed-toggle">▼</button>
    </div>
    <div class="feed-items" id="feed-items"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
